<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1c0e06"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="url(#bg)"/>

  <!-- Outer octagon border -->
  <polygon
    points="30,1 70,1 99,30 99,70 70,99 30,99 1,70 1,30"
    fill="none"
    stroke="#6b4318"
    stroke-width="1.5"
  />

  <!-- Inner octagon accent -->
  <polygon
    points="34,6 66,6 94,34 94,66 66,94 34,94 6,66 6,34"
    fill="none"
    stroke="#e8973a"
    stroke-width="0.5"
    opacity="0.25"
  />

  <!-- Question mark -->
  <text
    x="50"
    y="66"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="54"
    font-weight="bold"
    fill="#e8973a"
    opacity="0.55"
    filter="url(#glow)"
  >?</text>
</svg>
